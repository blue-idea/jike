# PR / push：质量门禁 + 供应链审计 + 密钥扫描 + Maestro Android E2E（与 docs/spec/tasks.md 任务 2 对齐）
name: CI

on:
  workflow_dispatch:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  install-and-verify:
    name: Lint & TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies (npm ci 校验 lockfile)
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

  security-audit:
    name: npm audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: npm audit（high 及以上阻断；使用官方 registry）
        run: npm audit --audit-level=high --registry=https://registry.npmjs.org/

  gitleaks:
    name: Secret scan (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  license-report:
    name: License summary (advisory)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Production dependency licenses
        run: npx --yes license-checker@25 --production --summary

  maestro-android:
    name: Maestro E2E (Android)
    needs: [install-and-verify]
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      CI: "true"
      EXPO_NO_TELEMETRY: "1"
      MAESTRO_CLI_NO_ANALYTICS: "1"
      EXPO_PUBLIC_SUPABASE_URL: https://example.supabase.co
      EXPO_PUBLIC_SUPABASE_ANON_KEY: ci-placeholder-anon-key
      EXPO_PUBLIC_AMAP_KEY: ci-placeholder-amap
      EXPO_PUBLIC_AI_API_KEY: ci-placeholder-ai
      GRADLE_OPTS: -Xmx4g -Dorg.gradle.daemon=false
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: android-actions/setup-android@v4

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('package-lock.json', 'app.json') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Enable KVM（Android 模拟器）
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Install npm dependencies
        run: npm ci

      - name: Expo prebuild (Android)
        run: npx expo prebuild --platform android

      # Debug 变体默认跳过 JS 打包且开启开发者支持（依赖本机 Metro），CI 无 Metro 会导致白屏/红屏，Maestro 断言失败。
      # Release 嵌入 bundle 且关闭开发者支持；模板对 release 仍使用 debug keystore，便于 CI 安装。
      - name: Build release APK (embedded JS for CI)
        run: |
          chmod +x android/gradlew
          cd android && ./gradlew assembleRelease --stacktrace

      - name: Install Maestro CLI
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> "$GITHUB_PATH"

      - name: Run Maestro flows
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          arch: x86_64
          target: google_apis
          profile: pixel_6
          script: |
            adb install -r android/app/build/outputs/apk/release/app-release.apk
            mkdir -p artifacts/maestro
            maestro test e2e/maestro/ --format junit --output artifacts/maestro/junit.xml || (adb exec-out screencap -p > artifacts/maestro/failure.png || true; maestro hierarchy > artifacts/maestro/view-hierarchy.txt || true; exit 1)

      - name: Upload Maestro artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: maestro-artifacts
          path: artifacts/maestro
          if-no-files-found: ignore
